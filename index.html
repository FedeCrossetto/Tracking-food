<!doctype html>
<html lang='es'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1, viewport-fit=cover'>
<title>Tracking Food · Plan de alimentación</title>
<meta name='apple-mobile-web-app-capable' content='yes'>
<meta name='mobile-web-app-capable' content='yes'>
<meta name='apple-mobile-web-app-status-bar-style' content='default'>
<meta name='apple-mobile-web-app-title' content='Alimentos'>
<meta name='theme-color' content='#F5C518'>
<link rel='apple-touch-icon' href='icon-180.png'>
<link rel='icon' type='image/png' href='icon-180.png'>
<link rel='manifest' href='manifest.json'>
<script src='https://unpkg.com/lucide@0.525.0/dist/umd/lucide.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js'></script>
<style>
:root{
  --bg:#F3F3F1; --card:#FFFFFF; --card-glass:rgba(255,255,255,.8);
  --ink:#1B1B19; --body:#3D3D39; --muted:#77776F; --line:#E6E6E1; --line2:#D3D3CC;
  --chip:#F0F0EB;
  --accent:#F2BE0F; --accent-ink:#1B1B19; --accent-strong:#8C6D00;
  --accent-soft:#FAF1CE; --accent-glow:rgba(242,190,15,.3);
  --done:#A3A39B;
  --shadow:0 8px 26px rgba(27,27,25,.08), 0 2px 6px rgba(27,27,25,.04);
  --shadow-sm:0 1px 4px rgba(27,27,25,.06);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#111110; --card:#1C1C1A; --card-glass:rgba(25,25,23,.82);
    --ink:#EFEFEA; --body:#C9C9C1; --muted:#8F8F87; --line:#2B2B28; --line2:#3B3B37;
    --chip:#262624;
    --accent:#F5C518; --accent-ink:#161613; --accent-strong:#F5C518;
    --accent-soft:#2E2811; --accent-glow:rgba(245,197,24,.2);
    --done:#6C6C65;
    --shadow:0 8px 26px rgba(0,0,0,.42), 0 2px 6px rgba(0,0,0,.3);
    --shadow-sm:0 1px 4px rgba(0,0,0,.32);
  }
}
:root[data-theme="light"]{
  --bg:#F3F3F1; --card:#FFFFFF; --card-glass:rgba(255,255,255,.8);
  --ink:#1B1B19; --body:#3D3D39; --muted:#77776F; --line:#E6E6E1; --line2:#D3D3CC;
  --chip:#F0F0EB;
  --accent:#F2BE0F; --accent-ink:#1B1B19; --accent-strong:#8C6D00;
  --accent-soft:#FAF1CE; --accent-glow:rgba(242,190,15,.3);
  --done:#A3A39B;
  --shadow:0 8px 26px rgba(27,27,25,.08), 0 2px 6px rgba(27,27,25,.04);
  --shadow-sm:0 1px 4px rgba(27,27,25,.06);
}
:root[data-theme="dark"]{
  --bg:#111110; --card:#1C1C1A; --card-glass:rgba(25,25,23,.82);
  --ink:#EFEFEA; --body:#C9C9C1; --muted:#8F8F87; --line:#2B2B28; --line2:#3B3B37;
  --chip:#262624;
  --accent:#F5C518; --accent-ink:#161613; --accent-strong:#F5C518;
  --accent-soft:#2E2811; --accent-glow:rgba(245,197,24,.2);
  --done:#6C6C65;
  --shadow:0 8px 26px rgba(0,0,0,.42), 0 2px 6px rgba(0,0,0,.3);
  --shadow-sm:0 1px 4px rgba(0,0,0,.32);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font:16px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  padding-bottom:calc(88px + env(safe-area-inset-bottom));
  -webkit-tap-highlight-color:transparent;
  min-height:100vh;
}
svg.ic,svg.lucide{display:block;flex:none}
i[data-lucide]{display:block;flex:none}
.wrap{max-width:560px;margin:0 auto;padding:22px 16px 8px}
header.app{margin-bottom:18px}
header.app .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
header.app h1{font-size:24px;font-weight:800;margin:0;letter-spacing:-.03em}
header.app h1 em{font-style:normal;color:var(--accent-strong)}
.kcal-pill{
  font-size:12px;font-weight:700;color:var(--accent-strong);background:var(--accent-soft);
  padding:6px 12px;border-radius:99px;font-variant-numeric:tabular-nums;white-space:nowrap;
}
header.app .sub{font-size:13px;color:var(--muted);margin:4px 0 0}
/* ---- selector de día ---- */
.daynav{
  position:relative;display:flex;margin:0 0 16px;padding:4px;
  background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-sm);
}
.daynav .pill{
  position:absolute;top:4px;bottom:4px;border-radius:10px;
  background:var(--accent);
  box-shadow:0 2px 8px var(--accent-glow);
  transition:left .38s cubic-bezier(.34,1.4,.4,1), width .38s cubic-bezier(.34,1.4,.4,1);
}
.daynav button{
  position:relative;z-index:1;flex:1;border:0;background:transparent;color:var(--muted);
  font:700 12.5px/1 inherit;font-family:inherit;padding:12px 0;border-radius:10px;cursor:pointer;
  transition:color .25s;
}
.daynav button.sel{color:var(--accent-ink)}
.daynav button.today:not(.sel){color:var(--accent-strong)}
/* ---- encabezado del día ---- */
.dayhead{display:flex;align-items:center;justify-content:space-between;margin:0 0 14px;min-height:56px}
.dayhead h2{font-size:20px;font-weight:800;margin:0;letter-spacing:-.02em}
.dayhead .hint{font-size:12.5px;color:var(--muted);margin-top:3px}
.ring{position:relative;width:56px;height:56px;flex:none}
.ring svg{transform:rotate(-90deg);display:block}
.ring .track{stroke:var(--line);fill:none;stroke-width:5}
.ring .val{
  stroke:var(--accent);fill:none;stroke-width:5;stroke-linecap:round;
  transition:stroke-dashoffset .8s cubic-bezier(.22,1,.36,1);
}
.ring .lbl{
  position:absolute;inset:0;display:grid;place-items:center;
  font-size:12px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent-strong);
}
/* ---- cards de comida ---- */
.meals{display:flex;flex-direction:column;gap:12px}
.meal{
  background:var(--card);border:1px solid var(--line);border-radius:18px;
  padding:16px;box-shadow:var(--shadow-sm);
  opacity:0;transform:translateY(16px);
}
.meal.in{animation:cardIn .5s cubic-bezier(.22,1.1,.36,1) forwards}
@keyframes cardIn{to{opacity:1;transform:none}}
.meal.now{border-color:var(--accent);box-shadow:var(--shadow)}
.mhead{display:flex;align-items:center;gap:11px;margin-bottom:10px}
.mic{
  width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex:none;
  background:var(--chip);color:var(--ink);
}
.meal.now .mic{background:var(--accent);color:var(--accent-ink)}
.meal.free .mic{background:var(--chip);color:var(--muted)}
.mtitle{display:flex;flex-direction:column;gap:1px;min-width:0}
.mname{font-weight:800;font-size:16px;letter-spacing:-.01em}
.mtime{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums}
.badges{margin-left:auto;display:flex;gap:5px}
.badge{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  padding:4px 9px;border-radius:99px;align-self:center;white-space:nowrap}
.badge.now{background:var(--accent);color:var(--accent-ink)}
.badge.opt{background:var(--chip);color:var(--muted)}
.badge.free{background:transparent;color:var(--muted);border:1px solid var(--line2)}
.mtext{font-size:15px;line-height:1.6;color:var(--body);margin:0}
.mnote{
  display:flex;gap:8px;align-items:flex-start;
  font-size:13px;line-height:1.55;color:var(--muted);margin:10px 0 0;
  background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:9px 11px;
}
.mnote svg{margin-top:2px;color:var(--accent-strong)}
.check{
  margin-top:13px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);
  padding-top:12px;cursor:pointer;user-select:none;font-size:13.5px;color:var(--muted);font-weight:700;
}
.check .box{
  width:26px;height:26px;border-radius:9px;border:2px solid var(--line2);display:grid;place-items:center;
  background:var(--card);flex:none;transition:background .2s,border-color .2s;
}
.check .box svg{width:14px;height:14px}
.check .box path{
  stroke:var(--accent-ink);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:20;stroke-dashoffset:20;
}
.meal.done .box{background:var(--accent);border-color:var(--accent)}
.meal.done .box path{stroke-dashoffset:0;transition:stroke-dashoffset .35s .05s ease-out}
.meal.done .mtext{color:var(--done)}
.meal.done .mname{color:var(--done)}
/* ---- semana ---- */
.wk{display:flex;flex-direction:column;gap:12px}
.wk .day{
  background:var(--card);border:1px solid var(--line);border-radius:18px;padding:6px 16px 12px;
  box-shadow:var(--shadow-sm);opacity:0;transform:translateY(16px);
}
.wk .day.in{animation:cardIn .5s cubic-bezier(.22,1.1,.36,1) forwards}
.wk h3{
  margin:0;padding:12px 0 10px;font-size:16px;letter-spacing:-.01em;
  display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line);
}
.wk h3 .chip{font-size:10px;font-weight:800;color:var(--accent-strong);background:var(--accent-soft);
  padding:3px 8px;border-radius:99px;letter-spacing:.06em}
.wrow{display:flex;gap:11px;padding:11px 0;border-top:1px solid var(--line)}
.wrow:nth-of-type(2){border-top:0}
.wrow .wic{
  width:32px;height:32px;border-radius:10px;display:grid;place-items:center;flex:none;
  background:var(--chip);color:var(--ink);margin-top:1px;
}
.wrow.free .wic{background:var(--chip);color:var(--muted)}
.wrow div{min-width:0}
.wrow b{display:block;font-size:13px;font-weight:800;margin-bottom:2px}
.wrow b span{font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums}
.wrow p{margin:0;font-size:13.5px;line-height:1.55;color:var(--body)}
/* ---- notas ---- */
.remind{
  background:var(--card);border:1px solid var(--line);border-radius:18px;
  padding:18px;margin-bottom:12px;box-shadow:var(--shadow-sm);
}
.remind .rhead{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.remind .rhead .mic{width:36px;height:36px}
.remind h3{margin:0;font-size:16px;letter-spacing:-.01em}
.remind p{font-size:13.5px;line-height:1.55;color:var(--body);margin:0 0 14px}
.remind ol{font-size:13px;line-height:1.55;color:var(--muted);margin:14px 0 0;padding-left:20px}
.remind ol li{margin:6px 0}
.btn{
  display:inline-flex;align-items:center;gap:9px;border:0;cursor:pointer;
  background:var(--accent);color:var(--accent-ink);
  font:700 14px/1 inherit;font-family:inherit;padding:14px 20px;border-radius:13px;
  box-shadow:0 4px 14px var(--accent-glow);transition:transform .15s,box-shadow .15s;
}
.btn:active{transform:scale(.96)}
.notes{display:flex;flex-direction:column;gap:10px}
.note{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:12px 14px;display:flex;gap:11px;box-shadow:var(--shadow-sm);
}
.note svg{color:var(--accent-strong);margin-top:5px}
.note p{margin:0;font-size:13.5px;line-height:1.55;color:var(--body)}
.note b{color:var(--ink)}
.credit{font-size:12px;color:var(--muted);margin-top:18px;text-align:center}
/* ---- tab bar ---- */
nav.tabs{
  position:fixed;left:12px;right:12px;bottom:calc(10px + env(safe-area-inset-bottom));
  max-width:420px;margin:0 auto;
  background:var(--card-glass);
  -webkit-backdrop-filter:blur(18px) saturate(1.4);backdrop-filter:blur(18px) saturate(1.4);
  border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);
  display:flex;padding:7px;z-index:10;
}
nav.tabs button{
  flex:1;border:0;background:none;color:var(--muted);font:700 11.5px/1 inherit;font-family:inherit;
  padding:9px 0 8px;border-radius:14px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:color .25s,background .25s,transform .15s;
}
nav.tabs button:active{transform:scale(.94)}
nav.tabs button.sel{color:var(--accent-strong);background:var(--accent-soft)}
button:focus-visible,.check:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
#view{will-change:opacity,transform}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
  .meal,.wk .day{opacity:1!important;transform:none!important}
}
</style>
</head>
<body>

<div class="wrap">
  <header class="app">
    <div class="top">
      <h1>Tracking <em>Food</em></h1>
      <span class="kcal-pill">2200 kcal/d</span>
    </div>
    <p class="sub">Plan de alimentación · Federico Vazquez Crossetto</p>
  </header>
  <div id="view"></div>
</div>

<nav class="tabs">
  <button data-tab="hoy" class="sel"></button>
  <button data-tab="semana"></button>
  <button data-tab="notas"></button>
</nav>

<script>
// ---- set de íconos SVG (trazo, hereda color) ----
const I=(p,s=20)=>`<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${p}</svg>`;
const ICON={
  des:s=>I('<path d="M12 2v3"/><path d="M5.2 7.2 7 9"/><path d="M18.8 7.2 17 9"/><path d="M7 17a5 5 0 0 1 10 0"/><path d="M3 17h18"/><path d="M5 21h14"/>',s),
  col:s=>I('<path d="M12 7.5c-2.6-1.7-6.5-.3-6.5 4.2 0 3.8 2.7 8.3 4.7 8.3.9 0 1.2-.5 1.8-.5s.9.5 1.8.5c2 0 4.7-4.5 4.7-8.3 0-4.5-3.9-5.9-6.5-4.2z"/><path d="M12 7.5c0-2 1.2-3.6 3.2-4.2"/>',s),
  alm:s=>I('<path d="M4 12h16c0 4.6-3.6 8-8 8s-8-3.4-8-8z"/><path d="M9 8.5V7"/><path d="M15 8.5V7"/><path d="M12 7.5V5"/>',s),
  mer:s=>I('<path d="M5 10h11v5.5a5.5 5.5 0 0 1-11 0V10z"/><path d="M16 11h1.5a2.75 2.75 0 0 1 0 5.5H16"/><path d="M8 6.5V5"/><path d="M12 6.5V5"/>',s),
  cen:s=>I('<path d="M20 14.2A8.2 8.2 0 1 1 9.8 4 6.6 6.6 0 0 0 20 14.2z"/>',s),
  hoy:s=>I('<circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/>',s),
  sem:s=>I('<rect x="3.5" y="5.5" width="17" height="15" rx="2.5"/><path d="M3.5 10.5h17"/><path d="M8.5 3v4"/><path d="M15.5 3v4"/>',s),
  not:s=>I('<path d="M6.5 3h8l4 4v14h-12V3z"/><path d="M14 3v4.5h4.5"/><path d="M9.5 13h5"/><path d="M9.5 16.5h5"/>',s),
  tip:s=>I('<path d="M9.5 18h5"/><path d="M10.5 21h3"/><path d="M12 3a6 6 0 0 1 3.5 10.9c-.7.5-1 1.3-1 2.1h-5c0-.8-.3-1.6-1-2.1A6 6 0 0 1 12 3z"/>',s),
  bell:s=>I('<path d="M6.5 15.5v-5a5.5 5.5 0 0 1 11 0v5l1.5 2.5H5l1.5-2.5z"/><path d="M10 21a2 2 0 0 0 4 0"/>',s),
  dl:s=>I('<path d="M12 4v11"/><path d="m7.5 10.5 4.5 4.5 4.5-4.5"/><path d="M5 20h14"/>',s),
  dot:s=>I('<circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/>',s),
};
// ---- íconos Lucide (CDN) con fallback offline al set propio ----
const LUC={des:"sunrise",col:"apple",alm:"soup",mer:"coffee",cen:"moon",
  hoy:"clock",sem:"calendar-days",not:"file-text",tip:"lightbulb",bell:"bell",dl:"download",dot:"leaf"};
const ico=(k,s)=>`<i data-lucide="${LUC[k]}" data-fb="${k}" data-s="${s}" width="${s}" height="${s}" stroke-width="2.1"></i>`;
function hydrateIcons(){
  if(window.lucide){lucide.createIcons();return}
  document.querySelectorAll("i[data-fb]").forEach(el=>{
    el.outerHTML=ICON[el.dataset.fb](+el.dataset.s);
  });
}
const DIAS=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
const DIAS_C=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
const MEALS=[
 {id:"des",n:"Desayuno",t:"6:30",from:5*60,to:9*60+30},
 {id:"col",n:"Colación",t:"10:30 – 11:00",from:9*60+30,to:11*60+30,opt:true},
 {id:"alm",n:"Almuerzo",t:"12:30 – 13:00",from:11*60+30,to:15*60},
 {id:"mer",n:"Merienda",t:"17:00 – 17:30",from:15*60,to:19*60},
 {id:"cen",n:"Cena",t:"20:30 – 21:00",from:19*60,to:23*60+59},
];
const EMOJI={des:"🍳",col:"🍎",alm:"🍲",mer:"🧉",cen:"🍽"}; // solo para el .ics
// PLAN[dia 0=Lun ... 6=Dom][mealId] = {x:texto, nt:nota opcional, free:true}
const PLAN=[
 { // LUNES
  des:{x:"Mates + 2 tostadas de pan integral con 4 huevos revueltos (2 claras + 2 enteros), 3 tomates cherry en rodajas y ½ palta pisada (aceite de oliva y limón), untadas con queso crema descremado."},
  col:{x:"Fruta a elección."},
  alm:{x:"Sopa de verduras (300 ml) + porción grande de arroz integral cocido (120 g, ¾ taza en crudo) + 1 pechuga de pollo grillada mediana (120–150 g)."},
  mer:{x:"Café con leche descremada + panqueque de avena (3 cdas de avena molida + 2 huevos) con 1 banana mediana (120 g), 2 nueces mariposa y 1 cda de pasta de maní sin azúcar (15 g) o frutos rojos."},
  cen:{x:"1 milanesa grande de carne (200–220 g, nalga o peceto) + puré mixto mediano (180 g: papa, batata, calabaza o boñato) + 4 tomates cherry."},
 },
 { // MARTES
  des:{x:"Yogur descremado + 1 cda sopera de granola (15 g) + frutos rojos (o 2 nueces mariposa + 1 cda de pasta de maní sin azúcar).",nt:"Frutos rojos: 2-3 frutillas, 6-8 arándanos, 4-6 frambuesas o moras."},
  col:{x:"1 barra de chocolate amargo (ej. Águila 70 %, se consigue en dietéticas)."},
  alm:{x:"2 filet de merluza al horno + porción grande de puré mixto (220–250 g).",nt:"Podés optar por papa, batata, calabaza o boñato."},
  mer:{x:"Infusión a elección + tortilla de espinaca y queso cremoso descremado (150–180 g: 2 huevos, 2 fetas de queso, 1 taza de espinaca) + 1 kiwi mediano (70 g)."},
  cen:{x:"Tarta de espinaca mediana (220–250 g) + 1 suprema de pollo grillada (150–180 g) + ensalada de zanahoria, huevo y tomate."},
 },
 { // MIÉRCOLES
  des:{x:"Café con leche descremada + omelette relleno: 3 huevos enteros, 2 fetas de queso descremado (40–50 g) y 1 feta de jamón natural. Tomate en rodajas a gusto."},
  col:{x:"Barra de cereal casera (o compradas tipo Integra: buena fibra y proteína)."},
  alm:{x:"Sopa crema de calabaza (300 ml) + 1 porción mediana de tarta integral de verduras (200–220 g)."},
  mer:{x:"Yogur descremado + 1 cda de granola (15 g) + frutos rojos (o 2 nueces mariposa + 1 cda de pasta de maní sin azúcar)."},
  cen:{x:"Porción grande (350–400 g) de guiso de lentejas con verduras (morrón, zanahoria, cebolla) y carne magra (cuadrada, bola de lomo o roast beef).",nt:"Podés sumar un poco de panceta o chorizo colorado para el sabor, sin excederte."},
 },
 { // JUEVES
  des:{x:"Mates + bowl mediano de cereales integrales sin azúcar (30–40 g) + 1 cda de pasta de maní sin azúcar (15 g) + 1 fruta mediana (120 g)."},
  col:{x:"Yogur griego descremado + 1 cda sopera de granola (15 g).",nt:"Si es casera, mejor sin maní."},
  alm:{x:"1 bife angosto grande a la plancha (180–200 g en crudo) + revuelto de zapallitos con cebolla y morrón (200–250 g) + 4 tomates cherry.",nt:"Si no tenés bife, suplantalo por 1 pechuga de pollo grillada (120–150 g)."},
  mer:{x:"Café con leche descremada + 2 tostadas de pan integral con 2 huevos revueltos (1 entero + 1 clara), tomate cherry, ½ palta pisada con limón y oliva, y queso crema descremado."},
  cen:{x:"Arroz integral, porción grande (120–150 g cocido) + 1 suprema de pollo grillada (150–180 g) + ½ plato de verduras salteadas (200–220 g: zapallitos, morrón, zanahoria, choclo…)."},
 },
 { // VIERNES
  des:{x:"Café con leche descremada + 2 tostadas de pan integral con 4 huevos revueltos (2 claras + 2 enteros), 3 tomates cherry, ½ palta pisada con limón/oliva y queso crema descremado."},
  col:{x:"Puñado de frutos secos: 4 almendras y 4 nueces mariposa."},
  alm:{x:"Sopa de verduras (300 ml) + porción mediana de pastel de papa (220–250 g).",nt:"Recomendado con carne picada magra (bola de lomo o cuadrada)."},

const NOTAS=[
 "<b>Objetivo del plan:</b> seguir modificando tu composición corporal — bajar tejido adiposo y ganar masa muscular.",
 "<b>La colación de media mañana es opcional.</b> Si llegás bien al almuerzo, no hace falta. También podés pasarla a media tarde (~19 hs) para no picotear antes de la cena.",
 "Hay bastante <b>proteína repartida en el día</b>: mejora el rendimiento, la saciedad, la recuperación y el desarrollo muscular.",
 "<b>Las comidas son ejemplos.</b> Podés cambiar pollo por carne, arroz por papa o una fruta por otra, manteniendo las porciones y alimentos ricos en HC y proteínas de calidad.",
 "Usá las porciones como <b>guía</b>: la idea es que con el tiempo sepas cuánto comer sin depender de la balanza.",
 "Los <b>fines de semana</b> tenés más libertad: no se trata de comer «perfecto», sino de aprender a elegir y medir porciones.",
 "<b>Semillas</b> (chía, lino, sésamo, girasol, calabaza): sumalas al yogur, tostadas, ensaladas u omelettes para fibra y grasas saludables.",
 "<b>Entrenamiento:</b> venís con 3-4 veces por semana; si de a poco llegás a 4-5, lo vas a notar un montón (y le hace bien a la espalda).",
 "Sumá <b>actividad aeróbica</b> al menos 1 vez por semana: bici, caminata o natación. Ayuda a la composición corporal y al dolor de espalda.",
 "<b>Hidratación:</b> agua durante todo el día, sobre todo los días de entrenamiento.",
];

let tab="hoy";
let selDay=(new Date().getDay()+6)%7; // 0=Lun
const $=s=>document.querySelector(s);
const REDUCED=matchMedia("(prefers-reduced-motion: reduce)").matches;
const todayKey=()=>{const d=new Date();return "hab-"+d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
const getDone=()=>{try{return JSON.parse(localStorage.getItem(todayKey())||"{}")}catch(e){return{}}};
const setDone=o=>{try{localStorage.setItem(todayKey(),JSON.stringify(o))}catch(e){}};

function currentMealId(){
  const now=new Date(); const m=now.getHours()*60+now.getMinutes();
  const meal=MEALS.find(x=>m>=x.from&&m<=x.to);
  return meal?meal.id:null;
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;")}
function stagger(sel){
  document.querySelectorAll(sel).forEach((el,i)=>{
    el.style.animationDelay=(i*55)+"ms"; el.classList.add("in");
  });
}
function movePill(){
  const nav=$(".daynav"); if(!nav)return;
  const btn=nav.querySelector("button.sel"), pill=nav.querySelector(".pill");
  if(btn&&pill){pill.style.left=btn.offsetLeft+"px";pill.style.width=btn.offsetWidth+"px"}
}

function renderHoy(anim){
  const todayIdx=(new Date().getDay()+6)%7;
  const isToday=selDay===todayIdx;
  const nowId=isToday?currentMealId():null;
  const done=isToday?getDone():null;
  const day=PLAN[selDay];
  const nav='<div class="daynav" role="tablist"><span class="pill"></span>'+DIAS_C.map((d,i)=>
    `<button class="${i===selDay?'sel':''} ${i===todayIdx?'today':''}" data-day="${i}">${d}</button>`).join("")+"</div>";
  const avail=MEALS.filter(m=>day[m.id]);
  let ringHTML="";
  if(isToday){
    const total=avail.length, ok=avail.filter(m=>done[m.id]).length;
    const R=24, C=2*Math.PI*R, off=C*(1-(total?ok/total:0));
    ringHTML=`<div class="ring" title="${ok} de ${total} comidas">
      <svg width="56" height="56" viewBox="0 0 56 56">
        <circle class="track" cx="28" cy="28" r="${R}"/>
        <circle class="val" cx="28" cy="28" r="${R}" stroke-dasharray="${C}" stroke-dashoffset="${C}" data-off="${off}"/>
      </svg><span class="lbl">${ok}/${total}</span></div>`;
  }
  const cards=avail.map(m=>{
    const d=day[m.id];
    const isNow=m.id===nowId, isDone=isToday&&done[m.id];
    let badges="";
    if(isNow&&!isDone) badges+='<span class="badge now">Ahora</span>';
    if(m.opt) badges+='<span class="badge opt">Opcional</span>';
    if(d.free) badges+='<span class="badge free">Libre</span>';
    return `<article class="meal ${isNow&&!isDone?'now':''} ${isDone?'done':''} ${d.free?'free':''}">
      <div class="mhead">
        <span class="mic">${ico(m.id,21)}</span>
        <span class="mtitle"><span class="mname">${m.n}</span><span class="mtime">${m.t}</span></span>
        <span class="badges">${badges}</span>
      </div>
      <p class="mtext">${esc(d.x)}</p>
      ${d.nt?`<p class="mnote">${ico("tip",15)}<span>${esc(d.nt)}</span></p>`:""}
      ${isToday?`<div class="check" role="checkbox" aria-checked="${!!isDone}" tabindex="0" data-meal="${m.id}">
        <span class="box"><svg viewBox="0 0 16 16"><path d="M3 8.5 6.5 12 13 4.5"/></svg></span>
        ${isDone?"Cumplida":"Marcar como cumplida"}</div>`:""}
    </article>`;
  }).join("");
  $("#view").innerHTML=nav+
    `<div class="dayhead"><div><h2>${DIAS[selDay]}${isToday?" · hoy":""}</h2>
     ${isToday?'<div class="hint">Tildá cada comida a medida que la cumplís</div>':'<div class="hint">Vista de otro día — el check solo aparece hoy</div>'}</div>${ringHTML}</div>`+
    `<div class="meals">${cards}</div>`;
  hydrateIcons();
  requestAnimationFrame(()=>{
    movePill();
    const v=$(".ring .val"); if(v)requestAnimationFrame(()=>{v.style.strokeDashoffset=v.dataset.off});
  });
  if(anim!==false)stagger(".meal");else document.querySelectorAll(".meal").forEach(el=>{el.classList.add("in");el.style.animationDuration="0s"});
  document.querySelectorAll("[data-day]").forEach(b=>b.onclick=()=>{
    if(+b.dataset.day===selDay)return;
    selDay=+b.dataset.day;renderHoy();
  });
  document.querySelectorAll(".check").forEach(c=>{
    const toggle=()=>{
      const o=getDone();const val=!o[c.dataset.meal];o[c.dataset.meal]=val;setDone(o);
      const card=c.closest(".meal");
      if(!REDUCED&&val&&card.animate){
        card.animate([{transform:"scale(1)"},{transform:"scale(.97)"},{transform:"scale(1)"}],
          {duration:300,easing:"cubic-bezier(.34,1.6,.4,1)"});
      }
      // día completo: festejo
      if(val&&!REDUCED&&window.confetti){
        const total=MEALS.filter(m=>PLAN[selDay][m.id]).length;
        const ok=MEALS.filter(m=>PLAN[selDay][m.id]&&o[m.id]).length;
        if(ok===total){
          confetti({particleCount:90,spread:75,origin:{y:.7},
            colors:["#F5C518","#B5940F","#EFEFEA","#3D3D39"]});
        }
      }
      renderHoy(false);
    };
    c.onclick=toggle;
    c.onkeydown=e=>{if(e.key===" "||e.key==="Enter"){e.preventDefault();toggle()}};
  });
}
function renderSemana(){
  const todayIdx=(new Date().getDay()+6)%7;
  $("#view").innerHTML='<div class="wk">'+PLAN.map((day,i)=>
    `<section class="day"><h3>${DIAS[i]}${i===todayIdx?' <span class="chip">HOY</span>':''}</h3>`+
    MEALS.filter(m=>day[m.id]).map(m=>{
      const d=day[m.id];
      return `<div class="wrow ${d.free?'free':''}">
        <span class="wic">${ico(m.id,17)}</span>
        <div><b>${m.n} <span>· ${m.t}</span></b><p>${esc(d.x)}</p></div>
      </div>`;
    }).join("")+
    "</section>").join("")+"</div>";
  hydrateIcons();
  stagger(".wk .day");
}
function renderNotas(){
  $("#view").innerHTML=`
  <div class="remind">
    <div class="rhead"><span class="mic">${ico("bell",19)}</span><h3>Recordatorios y widget</h3></div>
    <p>Descargá el calendario con las 5 comidas de cada día como eventos repetidos semanalmente, con alerta en cada horario y el detalle del plato en el evento.</p>
    <button class="btn" id="dl-ics">${ico("dl",17)} Descargar calendario (.ics)</button>
    <ol>
      <li>Tocá el botón y abrí el archivo descargado (Archivos → Descargas).</li>
      <li>Elegí <b>«Agregar todo»</b> al Calendario (ideal: creá antes un calendario «Alimentación» para poder ocultarlo o borrarlo fácil).</li>
      <li>Para el widget: mantené presionada la pantalla de inicio → «+» → <b>Calendario</b>. Te va a mostrar la próxima comida.</li>
    </ol>
  </div>
  <div class="notes">${NOTAS.map(n=>`<div class="note">${ico("dot",13)}<p>${n}</p></div>`).join("")}</div>
  <p class="credit">Nutricionista: @c.vazqueznutricion</p>`;
  hydrateIcons();
  $("#dl-ics").onclick=downloadICS;
}
// ---- generador de .ics ----
function icsEscape(s){return s.replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\r?\n/g,"\\n")}
function icsFold(line){
  let out="";
  while(line.length>70){
    let cut=70;
    if(line.charCodeAt(cut-1)>=0xd800&&line.charCodeAt(cut-1)<=0xdbff)cut-=1;
    out+=line.slice(0,cut)+"\r\n ";line=line.slice(cut);
  }
  return out+line;
}
function downloadICS(){
  const BYDAY=["MO","TU","WE","TH","FR","SA","SU"];
  const BASE=[6,7,8,9,10,11,12]; // semana del lunes 6/7/2026, hora local flotante
  const START={des:"0630",col:"1030",alm:"1230",mer:"1700",cen:"2030"};
  const END  ={des:"0700",col:"1100",alm:"1300",mer:"1730",cen:"2100"};
  let ev=[];
  PLAN.forEach((day,di)=>{
    MEALS.forEach(m=>{
      const d=day[m.id]; if(!d)return;
      const date="202607"+String(BASE[di]).padStart(2,"0");
      const summary=EMOJI[m.id]+" "+m.n+(d.free?" (libre)":"")+" · "+DIAS_C[di];
      let desc=d.x+(d.nt?"\n\nTip: "+d.nt:"");
      ev.push([
        "BEGIN:VEVENT",
        "UID:trackingfood-"+m.id+"-"+di+"@trackingfood.local",
        "DTSTAMP:20260707T000000Z",
        "DTSTART:"+date+"T"+START[m.id]+"00",
        "DTEND:"+date+"T"+END[m.id]+"00",
        "RRULE:FREQ=WEEKLY;BYDAY="+BYDAY[di],
        icsFold("SUMMARY:"+icsEscape(summary)),
        icsFold("DESCRIPTION:"+icsEscape(desc)),
        "BEGIN:VALARM",
        "ACTION:DISPLAY",
        icsFold("DESCRIPTION:"+icsEscape(m.n+": "+d.x.slice(0,80))),
        "TRIGGER:-PT0M",
        "END:VALARM",
        "END:VEVENT",
      ].join("\r\n"));
    });
  });
  const ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//TrackingFood//Plan Alimentacion//ES",
    "CALSCALE:GREGORIAN","METHOD:PUBLISH","X-WR-CALNAME:Alimentación",
    ev.join("\r\n"),"END:VCALENDAR"].join("\r\n")+"\r\n";
  const blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="plan-alimentacion.ics";
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}
// ---- tabs ----
const TABS=[["hoy","Hoy"],["semana","Semana"],["notas","Notas"]];
document.querySelectorAll("nav.tabs button").forEach((b,i)=>{
  b.innerHTML=ico(TABS[i][0]==="hoy"?"hoy":TABS[i][0]==="semana"?"sem":"not",20)+TABS[i][1];
});
const RENDER={hoy:renderHoy,semana:renderSemana,notas:renderNotas};
function render(){RENDER[tab]()}
function switchTab(next){
  if(next===tab)return;
  const order=["hoy","semana","notas"];
  const dir=order.indexOf(next)>order.indexOf(tab)?1:-1;
  tab=next;
  document.querySelectorAll("nav.tabs button").forEach(x=>x.classList.toggle("sel",x.dataset.tab===next));
  const view=$("#view");
  const go=()=>{window.scrollTo(0,0);render();
    if(!REDUCED&&view.animate)view.animate(
      [{opacity:0,transform:`translateX(${18*dir}px)`},{opacity:1,transform:"none"}],
      {duration:280,easing:"cubic-bezier(.22,1,.36,1)"});
  };
  if(!REDUCED&&view.animate){
    view.animate([{opacity:1,transform:"none"},{opacity:0,transform:`translateX(${-14*dir}px)`}],
      {duration:140,easing:"ease-in"}).onfinish=go;
  }else go();
}
document.querySelectorAll("nav.tabs button").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
addEventListener("resize",movePill);
render();
setInterval(()=>{if(tab==="hoy")renderHoy(false)},60000);
</script>
